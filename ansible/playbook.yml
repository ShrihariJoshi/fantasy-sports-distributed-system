- name: Deploy fantasy sports app
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    app_src: "{{ playbook_dir }}/.."
    app_dest: "/tmp/fantasy-sports-app"
    venv_path: "{{ app_dest }}/.venv"

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "{{ app_dest }}"
        state: directory
        mode: '0755'

    - name: Sync repository files to deployment path
      ansible.builtin.synchronize:
        src: "{{ app_src }}/"
        dest: "{{ app_dest }}/"
        archive: yes
        delete: yes
        recursive: yes
      delegate_to: localhost

    - name: Install requirements in virtualenv
      ansible.builtin.pip:
        requirements: "{{ app_dest }}/requirements.txt"
        virtualenv: "{{ venv_path }}"
        virtualenv_command: python3 -m venv
        virtualenv_site_packages: false
        executable: "{{ venv_path }}/bin/pip"

    - name: Validate deployment imports in virtualenv
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/python -c 'import flask, pymongo, redis, kafka, dotenv, werkzeug; print(\"Deployment imports ok\")'"
      changed_when: false

    - name: Touch deployment marker file
      ansible.builtin.file:
        path: "{{ app_dest }}/.deploy_complete"
        state: touch
        mode: '0644'
